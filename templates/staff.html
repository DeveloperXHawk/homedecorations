{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ananta | Staff Access</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --deep: #0A0A0F;
        }

        body {
            background: var(--deep);
            background: radial-gradient(circle at 50% 50%, rgba(201, 168, 76, 0.1) 0%, var(--deep) 100%);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .login-card {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .login-card h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(201, 168, 76, 0.1);
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.08);
            border-color: var(--gold);
            color: #fff;
            box-shadow: 0 0 10px rgba(201, 168, 76, 0.2);
        }

        .btn-login {
            background: var(--gold);
            color: #000;
            font-weight: 700;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            background: #b3943d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 168, 76, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="login-card">
        <h2>Staff <span style="color: #fff;">Access</span></h2>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2" style="font-size: 0.8rem; background: rgba(255,0,0,0.1); border: none; color: #ff4d4d;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="text-start mb-1" style="color: var(--gold); font-size: 0.8rem; font-weight: 600;">USERNAME</div>
            <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
            
            <div class="text-start mb-1" style="color: var(--gold); font-size: 0.8rem; font-weight: 600;">PASSWORD</div>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            
            <button type="submit" class="btn-login">Verify & Enter</button>
        </form>
        
        <a href="/" style="color: #555; text-decoration: none; font-size: 0.8rem; display: block; margin-top: 20px;">Back to Home</a>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(201, 168, 76, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function create() { for (let i = 0; i < 80; i++) particles.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', init);
        init(); create(); animate();
    </script>
</body>
</html>
